name: compose-smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: compose-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service-tests-and-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/api/package-lock.json
            services/frontend/package-lock.json

      - name: Install API dependencies
        working-directory: services/api
        run: npm ci

      - name: Run API tests
        working-directory: services/api
        run: npm test

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm ci

      - name: Build frontend
        working-directory: services/frontend
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build r-engine image (Buildx cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/r-engine/Dockerfile
          push: false
          tags: local/r-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compose smoke (config only)
        env:
          SKIP_API: "1"
          SKIP_BUILD: "1"
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: scripts/compose-smoke.sh
